<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Selenium SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; border-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header text-center">
                        <h1>AI Selenium Testing SaaS</h1>
                    </div>
                    <div class="card-body">
                        <div id="auth">
                            <h2 class="text-center">Login</h2>
                            <form id="login-form">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary">Login</button>
                                    <button type="button" class="btn btn-secondary" onclick="showRegister()">Register</button>
                                </div>
                            </form>
                            <div id="register-form" class="mt-3" style="display: none;">
                                <h3>Register</h3>
                                <div class="mb-3">
                                    <label for="reg-email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="reg-email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="reg-password" required>
                                </div>
                                <button class="btn btn-success" onclick="register()">Register</button>
                                <button class="btn btn-link" onclick="showLogin()">Back to Login</button>
                            </div>
                        </div>

                        <div id="main" style="display: none;">
                            <h2>Test Your Website</h2>
                            <div class="mb-3">
                                <label for="url" class="form-label">Website URL</label>
                                <input type="url" class="form-control" id="url" placeholder="https://example.com" required>
                            </div>
                            <button class="btn btn-primary" onclick="analyze()">Analyze & Generate Tests</button>

                            <div id="recommendations" class="mt-3" style="display: none;">
                                <h3>Test Recommendations</h3>
                                <ul id="rec-list" class="list-group"></ul>
                                <button class="btn btn-success mt-2" onclick="runTests()">Run Tests</button>
                            </div>

                            <div id="results" class="mt-3" style="display: none;">
                                <h3>Test Results</h3>
                                <pre id="results-json" class="bg-light p-3 rounded"></pre>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let token = localStorage.getItem('token');
        let testRunId = null;

        if (token) {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            login();
        });

        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        async function register() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            alert(data.message);
            if (res.ok) showLogin();
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                const data = await res.json();
                token = data.access_token;
                localStorage.setItem('token', token);
                document.getElementById('auth').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            } else {
                alert('Login failed');
            }
        }

        async function analyze() {
            const url = document.getElementById('url').value;
            const res = await fetch('/analyze', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ url })
            });
            if (res.ok) {
                const data = await res.json();
                testRunId = data.test_run_id;
                displayRecommendations(data.recommendations);
            } else {
                alert('Analysis failed');
            }
        }

        function displayRecommendations(recs) {
            const list = document.getElementById('rec-list');
            list.innerHTML = '';
            recs.forEach(rec => {
                const li = document.createElement('li');
                li.className = 'list-group-item';
                li.textContent = rec.description || rec.error;
                list.appendChild(li);
            });
            document.getElementById('recommendations').style.display = 'block';
        }

        async function runTests() {
            const res = await fetch(`/run_tests/${testRunId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('results-json').textContent = JSON.stringify(data.results, null, 2);
                document.getElementById('results').style.display = 'block';
            } else {
                alert('Test run failed');
            }
        }
    </script>
</body>
</html>
