version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - OPEN_AI_KEY=${OPEN_AI_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - S3_BUCKET=${S3_BUCKET}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK}
    volumes:
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - app